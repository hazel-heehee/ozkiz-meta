name: 🔄 Sync Competitor Data Daily

on:
  schedule:
    # 매일 한국시간 새벽 1시 (UTC 16:00 전날)
    - cron: '0 16 * * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Sync competitor data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node .github/scripts/sync-competitors.js
