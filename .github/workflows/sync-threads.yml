name: Sync Threads (ozkiz_official)

# 매일 KST 23:45 자동 실행 + 수동 실행 가능
on:
  workflow_dispatch:
  schedule:
    # KST 23:45 = UTC 14:45
    - cron: '45 14 * * *'

jobs:
  sync-threads:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Sync Threads
        working-directory: .github/scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
        run: node sync-threads.js
